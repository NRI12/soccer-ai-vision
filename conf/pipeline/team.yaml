# @package _global_
team:
  enabled: true
  # from_model : dùng class_id từ YOLO (player_left / player_right)
  # from_color : KMeans k=2 trên màu áo (LAB), tự động, không cần nhãn model
  mode: from_color
  kmeans_warmup_frames: 60   # tích lũy bao nhiêu frame trước khi fit lần đầu
  kmeans_min_crop_h: 30      # bỏ qua crop quá nhỏ (pixel)
