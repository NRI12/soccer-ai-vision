model:
  name: 'osnet_x1_0'
  pretrained: True

data:
  type: 'image'
  root: 'datasets'
  height: 256
  width: 128
  # RTX 3090 has 255 CPU cores available — 16 workers is practical sweet spot
  workers: 16
  sources: ['soccernetv3']
  targets: ['soccernetv3', 'soccernetv3_test', 'soccernetv3_challenge']
  transforms: ['random_flip', 'random_crop', 'random_patch', 'random_erase']
  save_dir: 'logs/rtx3090_20ep'

soccernetv3:
  training_subset: 1.0

sampler:
  train_sampler: RandomIdentitySampler_Hierarchical
  train_sampler_t: RandomIdentitySampler
  # 256 batch / 8 instances = 32 identities per batch — richer triplet mining
  num_instances: 8

loss:
  name: 'triplet'
  softmax:
    label_smooth: True
  triplet:
    margin: 0.5
    weight_t: 0.9
    weight_x: 0.5
    weight_tc: 0.0
    weight_cc: 0.5
    topk: 1
    bottomk: 1

train:
  optim: 'adam'
  lr: 0.0003
  weight_decay: 5e-4
  batch_size: 256
  max_epoch: 20
  stepsize: [15, 18]
  gamma: 0.1
  lr_scheduler: 'multi_step'
  print_freq: 50
  seed: 1
  amp: True
  cudnn_benchmark: True

test:
  # Large test batch is safe — no gradients computed
  batch_size: 512
  dist_metric: 'euclidean'
  normalize_feature: False
  ranks: [1, 5, 10]
  eval_freq: 5
  start_eval: 10
  export_ranking_results: True
